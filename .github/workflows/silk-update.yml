name: Update Silk Dependencies
on:
  # schedule:
  #   - cron: 0 0,6,12,18 * * 1-5
  #   - cron: 0 0 * * 0,6
  workflow_dispatch:
    inputs:
      dry-run:
        description: Run without making changes (for testing)
        type: boolean
        default: true
      branch:
        description: Branch name for dependency update PR
        type: string
        default: pnpm/config-deps

concurrency:
  group: pnpm-update-${{ github.ref }}
  cancel-in-progress: true
jobs:
  pnpm-update:
    name: Update Config Dependencies
    runs-on: macos-26
    permissions:
      contents: write
      pull-requests: write
      checks: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0
      - name: Setup Runtime
        id: runtime
        uses: savvy-web/silk-runtime-action@v1
      - name: Update Config Dependencies
        id: update
        uses: savvy-web/silk-update-action@v4
        with:
          app-client-id: ${{ vars.APP_CLIENT_ID }}
          app-private-key: ${{ secrets.APP_PRIVATE_KEY }}
          branch: ${{ inputs.branch || 'pnpm/config-deps' }}
          dry-run: ${{ inputs.dry-run || false }}
          changesets: true
          auto-merge: "squash"
          upgrade-package-manager: "^11.0.0"
          upgrade-runtime-node: "^26.0.0"
          config-dependencies: |
            @savvy-web/pnpm-plugin-silk
            @effected/pnpm-plugin-effect
          dependencies: |
            @effected/*
            @modelcontextprotocol/*
            @rspress/*
            @savvy-web/*
            @trpc/*
            acorn
            acorn-typescript
            ajv
            ink
            magic-string
            rspress-plugin-api-extractor
            rspress-plugin-mermaid
            std-env
            vite
            zod
          run: |
            pnpm savvy init
            pnpm lint:fix 2>/dev/null || true

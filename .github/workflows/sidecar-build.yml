name: Sidecar Build

# Cross-platform build + smoke verification for vitest-agent-sidecar.
#
# The sidecar ships a Node Single Executable Application (SEA) binary
# per platform. Each `vitest-agent-sidecar-<platform>` child package
# now compiles ITS OWN binary via tsdown's `exe` mode with a single
# `targets` entry; tsdown downloads the target's Node runtime as
# needed. A single Linux host still cross-builds all five children
# (tsdown can build any target from any host), so the `build` job runs
# once on Linux via a plain `pnpm build:prod` and the `smoke` job fans
# out to native runners to execute each binary.
#
# Publishing the five `vitest-agent-sidecar-<platform>` sub-packages to
# npm and GitHub Packages is wired into the Wave 4 release flow
# alongside the six lockstep packages — it is intentionally NOT in this
# workflow. This workflow proves the binaries build and run; the
# release workflow ships them.

on:
  push:
    branches: [main]
    paths:
      - "packages/sidecar/**"
      - "packages/sidecar-*/**"
      - "packages/cli/src/**"
      - ".github/workflows/sidecar-build.yml"
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - "packages/sidecar/**"
      - "packages/sidecar-*/**"
      - "packages/cli/src/**"
      - ".github/workflows/sidecar-build.yml"
  workflow_dispatch:

concurrency:
  group: sidecar-build-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # tsdown's SEA `exe` mode requires Node >= 25.7.0. Keep this in sync
  # with devEngines.runtime in the root package.json.
  NODE_VERSION: "25.9.0"

jobs:
  build:
    name: Build SEA binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Runtime
        id: runtime
        uses: savvy-web/workflow-runtime-action@main

      - name: Build SEA binaries
        # turbo orders the five vitest-agent-sidecar-<platform>
        # children (each compiles its own SEA into its own bin/)
        # before the vitest-agent-sidecar parent, and pulls in the
        # cli / sdk dependency builds the children bundle into the
        # SEA. No post-build staging step is needed — each child's
        # tsdown config renames its binary to bin/vitest-agent-sidecar
        # in place via its onSuccess hook.
        run: pnpm turbo run build:prod --filter='./packages/sidecar' --filter='./packages/sidecar-*'

      - name: Upload darwin-arm64 binary
        uses: actions/upload-artifact@v7
        with:
          name: sidecar-darwin-arm64
          path: packages/sidecar-darwin-arm64/bin/vitest-agent-sidecar
          if-no-files-found: error

      - name: Upload darwin-x64 binary
        uses: actions/upload-artifact@v7
        with:
          name: sidecar-darwin-x64
          path: packages/sidecar-darwin-x64/bin/vitest-agent-sidecar
          if-no-files-found: error

      - name: Upload linux-arm64 binary
        uses: actions/upload-artifact@v7
        with:
          name: sidecar-linux-arm64
          path: packages/sidecar-linux-arm64/bin/vitest-agent-sidecar
          if-no-files-found: error

      - name: Upload linux-x64 binary
        uses: actions/upload-artifact@v7
        with:
          name: sidecar-linux-x64
          path: packages/sidecar-linux-x64/bin/vitest-agent-sidecar
          if-no-files-found: error

      - name: Upload win32-x64 binary
        uses: actions/upload-artifact@v7
        with:
          name: sidecar-win32-x64
          path: packages/sidecar-win32-x64/bin/vitest-agent-sidecar.exe
          if-no-files-found: error

  smoke:
    name: Smoke ${{ matrix.platform }}
    needs: build
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin-arm64
            runner: macos-14
            binary: vitest-agent-sidecar
          - platform: darwin-x64
            runner: macos-13
            binary: vitest-agent-sidecar
          - platform: linux-x64
            runner: ubuntu-24.04
            binary: vitest-agent-sidecar
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
            binary: vitest-agent-sidecar
          - platform: win32-x64
            runner: windows-2022
            binary: vitest-agent-sidecar.exe
    steps:
      - name: Download ${{ matrix.platform }} binary
        uses: actions/download-artifact@v8
        with:
          name: sidecar-${{ matrix.platform }}
          path: bin

      - name: Run binary smoke tests
        shell: bash
        run: |
          set -euo pipefail
          binary="bin/${{ matrix.binary }}"
          chmod +x "$binary" 2>/dev/null || true

          # 1. inject-env rewrites a Vitest command with the env prefix.
          export VITEST_AGENT_CONVERSATION_ID=c1
          export VITEST_AGENT_AGENT_ID=a1
          rewritten=$("$binary" inject-env --command "vitest run" --cwd .)
          expected="VITEST_AGENT_CONVERSATION_ID=c1 VITEST_AGENT_AGENT_ID=a1 vitest run"
          if [ "$rewritten" != "$expected" ]; then
            echo "::error::inject-env rewrite mismatch on ${{ matrix.platform }}"
            echo "  expected: $expected"
            echo "  actual:   $rewritten"
            exit 1
          fi

          # 2. inject-env leaves a non-Vitest command unchanged.
          passthrough=$("$binary" inject-env --command "ls -la" --cwd .)
          if [ "$passthrough" != "ls -la" ]; then
            echo "::error::inject-env passthrough mismatch on ${{ matrix.platform }}"
            echo "  actual: $passthrough"
            exit 1
          fi

          # 3. An unknown subcommand exits 5 with the stderr contract shape.
          set +e
          err=$("$binary" frobnicate 2>&1 >/dev/null)
          code=$?
          set -e
          if [ "$code" -ne 5 ]; then
            echo "::error::unknown-subcommand exit code was $code, expected 5"
            exit 1
          fi
          case "$err" in
            "5 Defect: unknown subcommand: frobnicate"*) ;;
            *)
              echo "::error::unknown-subcommand stderr mismatch: $err"
              exit 1
              ;;
          esac

          echo "${{ matrix.platform }} smoke passed"

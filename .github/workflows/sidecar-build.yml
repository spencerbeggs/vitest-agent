name: Sidecar Build

# Per-platform native build + smoke verification for vitest-agent-sidecar.
#
# The sidecar ships a Node Single Executable Application (SEA) binary
# per platform. Each `vitest-agent-sidecar-<platform>` child package
# compiles ITS OWN binary via tsdown's `exe` mode.
#
# This workflow is a single matrix: every platform is built AND
# smoke-tested on its own NATIVE runner — no cross-compilation. A SEA
# is host-arch-specific machinery; cross-building one is fragile (a
# darwin-x64 SEA cross-built on an arm64 macOS host segfaults at
# runtime, and a Windows SEA needs zip extraction a Linux `tar` cannot
# do). Building each target where it will run sidesteps all of that.
#
# Publishing the five `vitest-agent-sidecar-<platform>` sub-packages to
# npm and GitHub Packages is wired into the Wave 4 release flow
# alongside the six lockstep packages — it is intentionally NOT in this
# workflow. This workflow proves the binaries build and run; the
# release workflow ships them.

on:
  push:
    branches: [main]
    paths:
      - "packages/sidecar/**"
      - "packages/sidecar-*/**"
      - "packages/cli/src/**"
      - ".github/workflows/sidecar-build.yml"
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - "packages/sidecar/**"
      - "packages/sidecar-*/**"
      - "packages/cli/src/**"
      - ".github/workflows/sidecar-build.yml"
  workflow_dispatch:

concurrency:
  group: sidecar-build-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  binary:
    name: Binary ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin-arm64
            runner: macos-15
            binary: vitest-agent-sidecar
          - platform: darwin-x64
            runner: macos-15-intel
            binary: vitest-agent-sidecar
          - platform: linux-x64
            runner: ubuntu-24.04
            binary: vitest-agent-sidecar
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
            binary: vitest-agent-sidecar
          - platform: win32-x64
            runner: windows-2022
            binary: vitest-agent-sidecar.exe
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Runtime
        id: runtime
        uses: savvy-web/workflow-runtime-action@main

      - name: Build the SEA binary
        # The child builds on its native runner, so tsdown's `exe`
        # target matches the host — a native build, no cross-arch
        # machinery. turbo builds vitest-agent-cli and vitest-agent-sdk
        # first (the child bundles them into the SEA).
        run: pnpm turbo run build:prod --filter=vitest-agent-sidecar-${{ matrix.platform }}

      - name: Assert dist publish manifests
        shell: bash
        run: |
          set -euo pipefail
          for variant in github npm; do
            manifest="packages/sidecar-${{ matrix.platform }}/dist/${variant}/package.json"
            test -f "$manifest" || { echo "::error::missing $manifest"; exit 1; }
            for field in devDependencies scripts publishConfig packageManager devEngines; do
              if jq -e --arg f "$field" 'has($f)' "$manifest" >/dev/null; then
                echo "::error::$manifest still has .$field"; exit 1
              fi
            done
            [ "$(jq -r '.private' "$manifest")" = "false" ] || { echo "::error::$manifest .private is not false"; exit 1; }
            name=$(jq -r '.name' "$manifest")
            case "$variant" in
              github) case "$name" in @spencerbeggs/*) ;; *) echo "::error::$manifest github name not scoped: $name"; exit 1;; esac ;;
              npm)    case "$name" in @spencerbeggs/*) echo "::error::$manifest npm name wrongly scoped: $name"; exit 1;; *) ;; esac ;;
            esac
          done
          echo "dist publish manifests OK"

      - name: Smoke-test the binary
        shell: bash
        run: |
          set -euo pipefail
          binary="packages/sidecar-${{ matrix.platform }}/dist/npm/bin/${{ matrix.binary }}"
          chmod +x "$binary" 2>/dev/null || true

          # 1. inject-env rewrites a Vitest command with the env prefix.
          export VITEST_AGENT_CONVERSATION_ID=c1
          export VITEST_AGENT_AGENT_ID=a1
          rewritten=$("$binary" inject-env --command "vitest run" --cwd .)
          expected="VITEST_AGENT_CONVERSATION_ID=c1 VITEST_AGENT_AGENT_ID=a1 vitest run"
          if [ "$rewritten" != "$expected" ]; then
            echo "::error::inject-env rewrite mismatch on ${{ matrix.platform }}"
            echo "  expected: $expected"
            echo "  actual:   $rewritten"
            exit 1
          fi

          # 2. inject-env leaves a non-Vitest command unchanged.
          passthrough=$("$binary" inject-env --command "ls -la" --cwd .)
          if [ "$passthrough" != "ls -la" ]; then
            echo "::error::inject-env passthrough mismatch on ${{ matrix.platform }}"
            echo "  actual: $passthrough"
            exit 1
          fi

          # 3. An unknown subcommand exits 5 with the stderr contract shape.
          set +e
          err=$("$binary" frobnicate 2>&1 >/dev/null)
          code=$?
          set -e
          if [ "$code" -ne 5 ]; then
            echo "::error::unknown-subcommand exit code was $code, expected 5"
            exit 1
          fi
          case "$err" in
            "5 Defect: unknown subcommand: frobnicate"*) ;;
            *)
              echo "::error::unknown-subcommand stderr mismatch: $err"
              exit 1
              ;;
          esac

          echo "${{ matrix.platform }} build + smoke passed"

      - name: Upload ${{ matrix.platform }} binary
        uses: actions/upload-artifact@v7
        with:
          name: sidecar-${{ matrix.platform }}
          path: packages/sidecar-${{ matrix.platform }}/dist/npm/bin/${{ matrix.binary }}
          if-no-files-found: error
